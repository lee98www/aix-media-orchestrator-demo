<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIX — 시스템 구성도 (MVP PoC)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="assets/style.css">
<style>
  body { background: #fff; }
  .sheet { max-width: 1240px; margin: 0 auto; padding: 44px 48px 64px; }

  .doc-head { display: flex; align-items: center; gap: 14px; padding-bottom: 22px; border-bottom: 2px solid var(--ink); }
  .doc-head .titles { flex: 1; }
  .doc-head h1 { font-size: 23px; font-weight: 800; letter-spacing: -0.025em; }
  .doc-head .sub { font-size: 13.5px; color: var(--gray-500); margin-top: 3px; }
  .legend { display: flex; gap: 8px; }
  .lg { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 700; border-radius: 99px; padding: 6px 13px; }
  .lg i { width: 10px; height: 10px; border-radius: 3px; }
  .lg-own { background: var(--blue-soft); color: var(--blue-deep); } .lg-own i { background: var(--blue); }
  .lg-oss { background: var(--green-soft); color: #00935b; } .lg-oss i { background: var(--green); }
  .lg-api { background: var(--orange-soft); color: #e07c00; } .lg-api i { background: var(--orange); }

  .diagram { display: grid; grid-template-columns: minmax(0, 1fr) 218px; gap: 18px; margin-top: 30px; }
  .layers { display: flex; flex-direction: column; }

  .layer-row { display: flex; gap: 12px; align-items: stretch; }
  .layer-label {
    width: 86px; flex: none; display: flex; align-items: center; justify-content: center;
    font-size: 11.5px; font-weight: 800; color: var(--gray-400);
    border-right: 1px dashed var(--line); text-align: center; line-height: 1.5;
  }
  .boxes { display: flex; gap: 12px; flex: 1; padding: 0 0 0 12px; }

  .node {
    flex: 1; border: 1.5px solid var(--line); border-radius: 13px;
    padding: 13px 15px 12px; background: #fff; position: relative;
    border-top-width: 4px;
  }
  .node h4 { font-size: 13.5px; font-weight: 800; letter-spacing: -0.015em; }
  .node p { font-size: 11.5px; color: var(--gray-500); margin-top: 4px; line-height: 1.55; }
  .node .src { display: inline-block; font-size: 10px; font-weight: 800; border-radius: 5px; padding: 2px 7px; margin-top: 8px; margin-right: 4px; }
  .src-own { background: var(--blue-soft); color: var(--blue-deep); }
  .src-oss { background: var(--green-soft); color: #00935b; }
  .src-api { background: var(--orange-soft); color: #e07c00; }
  .n-own { border-top-color: var(--blue); }
  .n-oss { border-top-color: var(--green); }
  .n-api { border-top-color: var(--orange); }
  .n-mix { border-top-color: var(--blue); border-top-style: solid;
    background-image: linear-gradient(90deg, var(--blue) 50%, var(--green) 50%);
    background-size: 100% 4px; background-repeat: no-repeat; background-position: 0 -1.5px; }

  .arrows { display: flex; justify-content: center; padding: 7px 0 7px 98px; }
  .arrow-down { display: flex; flex-direction: column; align-items: center; color: var(--gray-300); }

  .wide { border-radius: 13px; }

  /* 우: 외부 상용 API 컬럼 */
  .ext {
    border: 1.5px dashed #f3c98c; background: #fffaf2; border-radius: 16px;
    padding: 16px 14px; display: flex; flex-direction: column; gap: 9px; align-self: stretch;
  }
  .ext h3 { font-size: 13px; font-weight: 800; color: #b96a00; display: flex; align-items: center; gap: 7px; }
  .ext h3 i { width: 9px; height: 9px; border-radius: 3px; background: var(--orange); }
  .ext .e-item { background: #fff; border: 1px solid #f3deba; border-radius: 10px; padding: 9px 11px; }
  .ext .e-item b { font-size: 12px; font-weight: 800; display: block; }
  .ext .e-item span { font-size: 10.5px; color: var(--gray-500); }
  .ext .e-note { font-size: 10.5px; color: #b96a00; line-height: 1.55; margin-top: auto; padding-top: 6px; }

  .arch-fig { margin-top: 28px; }
  .arch-fig img { width: 100%; display: block; border: 1px solid var(--line); border-radius: 14px; }

  .foot-note { margin-top: 26px; display: flex; gap: 24px; font-size: 12px; color: var(--gray-500); border-top: 1px solid var(--line); padding-top: 16px; }
  .foot-note b { color: var(--gray-700); }
</style>
</head>
<body>
<div class="sheet">
  <header class="doc-head">
    <span class="logo-mark" style="width:40px;height:40px;border-radius:12px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 4.5 5.5 19.5M12 4.5l6.5 15M7.8 14.5h8.4" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <div class="titles">
      <h1>AIX Media Orchestrator — 시스템 구성도 · 뉴스·광고 제작 MVP (PoC)</h1>
      <div class="sub">분류 — System Architecture (시스템 구성도) · SaaS API 제공 · 결제 제외 · 오픈소스 + 상용 API 혼용 · 2026.06</div>
    </div>
  </header>

  <figure class="arch-fig">
    <img src="assets/img/architecture.png" alt="AIX 시스템 구성도 — 클라이언트·API·코어 서비스·미디어 파이프라인·데이터 5계층과 외부 상용 API 사이드바">
  </figure>

  <div class="foot-note">
    <span><b>산출물</b> — Presales 가능한 SaaS API 형태 MVP (결제 제외)</span>
    <span><b>기간</b> — 5개월</span>
    <span><b>핵심 차별화</b> — 온톨로지 기반 개인화 ON/OFF · 오픈소스+상용 혼용 최적 구성</span>
  </div>
</div>
</body>
</html>
